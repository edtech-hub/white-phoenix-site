<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — White Phoenix</title>
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#0E1014">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0E1014;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(closest-side,rgba(255,110,30,.18),transparent 72%);pointer-events:none}
.wrap{position:relative;max-width:520px}
.code{font-size:clamp(4rem,14vw,7rem);font-weight:700;letter-spacing:-.03em;background:linear-gradient(92deg,#FF5C1A,#FFB42E);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
h1{font-size:1.6rem;font-weight:600;margin:.4rem 0 1rem}
p{color:rgba(255,255,255,.6);margin-bottom:2rem;line-height:1.6}
a{display:inline-flex;align-items:center;gap:.5rem;font-weight:600;padding:.9rem 1.7rem;border-radius:99px;background:linear-gradient(92deg,#FF5C1A,#FFB42E);color:#fff;text-decoration:none;transition:transform .2s}
a:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div class="glow"></div>
<div class="wrap">
  <div class="code">404</div>
  <h1>This page took flight</h1>
  <p>The page you're looking for doesn't exist or has moved. Let's get you back on track.</p>
  <a href="/">Back to home</a>
</div>
</body>
</html>
